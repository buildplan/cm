<!DOCTYPE html>
<html lang="en" class="bg-gray-900 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Container Monitor</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen flex flex-col items-center p-6">
    <div id="auth-screen" class="w-full max-w-md mt-20 bg-gray-800 p-8 rounded-xl shadow-xl border border-gray-700 hidden">
        <h2 class="text-2xl font-bold mb-4 text-cyan-400">🔒 Authenticate</h2>
        <input type="password" id="token-input" placeholder="Enter Secret Token" class="w-full p-3 bg-gray-900 border border-gray-600 rounded mb-4 text-white">
        <button onclick="login()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded transition">Login</button>
    </div>

    <div id="app-screen" class="w-full max-w-6xl hidden">
        <header class="flex justify-between items-center mb-8 pb-4 border-b border-gray-700">
            <div class="flex items-center gap-6">
                <h1 class="text-3xl font-bold text-cyan-400">☸️ Container Monitor</h1>
                <nav class="hidden md:flex space-x-6 border-l border-gray-700 pl-6">
                    <button onclick="switchTab('dashboard')" id="tab-dashboard" class="text-cyan-400 font-bold transition">Dashboard</button>
                    <button onclick="switchTab('settings')" id="tab-settings" class="text-gray-400 hover:text-cyan-400 transition">Settings</button>
                </nav>
            </div>
            <div class="space-x-4 flex items-center">
                <button id="update-all-btn" onclick="updateAll()" class="hidden bg-yellow-600 hover:bg-yellow-500 px-4 py-2 rounded font-medium transition shadow-[0_0_10px_rgba(202,138,4,0.4)] text-white">🔄 Update All Eligible</button>
                <button id="run-check-btn" onclick="triggerRun()" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded font-medium transition flex items-center gap-2">⚙️ Run Check Now</button>
                <button onclick="logout()" class="text-gray-400 hover:text-red-400 transition ml-4">Logout</button>
            </div>
        </header>

        <div id="host-stats-bar" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-gray-800/80 border border-gray-700 p-6 rounded-xl flex items-center justify-between shadow-lg">
                <div>
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Host CPU Load (1m)</p>
                    <p id="stat-cpu" class="text-4xl font-bold text-cyan-400">--</p>
                </div>
                <div class="text-5xl opacity-50 grayscale">⚙️</div>
            </div>
            <div class="bg-gray-800/80 border border-gray-700 p-6 rounded-xl flex items-center justify-between shadow-lg">
                <div>
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Host Memory</p>
                    <div class="flex items-baseline gap-3">
                        <p id="stat-mem" class="text-4xl font-bold text-cyan-400">--</p>
                        <p id="stat-mem-detail" class="text-sm text-gray-500 font-medium">-- / --</p>
                    </div>
                </div>
                <div class="text-5xl opacity-80">🧠</div>
            </div>
            <div class="bg-gray-800/80 border border-gray-700 p-6 rounded-xl flex items-center justify-between shadow-lg">
                <div>
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">Host Disk (<span id="stat-disk-fs" class="uppercase">/</span>)</p>
                    <div class="flex items-baseline gap-3">
                        <p id="stat-disk" class="text-4xl font-bold text-cyan-400">--</p>
                        <p id="stat-disk-detail" class="text-sm text-gray-500 font-medium">-- / --</p>
                    </div>
                </div>
                <div class="text-5xl opacity-80">💾</div>
            </div>
        </div>

        <div id="dashboard-view" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="settings-view" class="w-full hidden bg-gray-800 rounded-xl border border-gray-700 p-6">
            <h2 class="text-2xl font-bold mb-2 text-white">⚙️ Configuration (config.yml)</h2>
            <p class="text-sm text-gray-400 mb-4">Edit your thresholds, notifications, and monitor list directly. Comments are preserved.</p>
            <textarea id="config-editor" class="w-full h-[600px] bg-gray-900 text-green-400 p-4 rounded border border-gray-700 font-mono text-sm focus:outline-none focus:border-cyan-500 selection:bg-green-900" spellcheck="false"></textarea>
            <div class="mt-4 flex justify-between items-center">
                <span id="config-save-status" class="text-sm text-gray-400"></span>
                <button onclick="saveConfig()" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-2 px-6 rounded transition">💾 Save Configuration</button>
            </div>
        </div>

    </div>

    <div id="log-modal" class="fixed inset-0 bg-black/80 hidden flex-col items-center justify-center p-4 z-50">
        <div class="bg-gray-800 rounded-xl w-full max-w-4xl border border-gray-700 shadow-2xl flex flex-col h-[80vh]">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900 rounded-t-xl">
                <h3 class="font-bold text-lg text-cyan-400" id="log-modal-title">Container Logs</h3>
                <button onclick="closeLogModal()" class="text-gray-400 hover:text-white text-xl font-bold transition">✕</button>
            </div>
            <div class="p-4 overflow-auto flex-1 bg-black font-mono text-sm text-green-400 whitespace-pre-wrap selection:bg-green-900" id="log-modal-content">
                Loading...
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
