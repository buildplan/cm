name: Python Checks

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.3

    - name: Set up Python
      uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn apscheduler pyyaml docker httpx pydantic ruff

    - name: Lint with Ruff
      run: |
        # Check for syntax errors, undefined names, and other critical issues
        # Start with basic checks to prevent immediate CI failures on style rules
        ruff check --select E9,F63,F7,F82 --output-format=github .
